<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Gerador de Sermões - Gere pregações rapidamente">
    <title>Gerador de Sermões Pro v2</title>
<link rel="icon" href="icone_sermoes.png" type="image/png">
    <link rel="apple-touch-icon" href="icone_sermoes.png">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-card: #1a1a1a;
            --bg-input: #252525;
            --primary: #f5b041;
            --primary-light: #ffd580;
            --primary-dark: #d4941c;
            --accent: #e74c3c;
            --text-light: #f0f0f0;
            --text-muted: #888;
            --border: #333;
            --success: #27ae60;
            --info: #3498db;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            --glow: 0 0 30px rgba(245,176,65,0.3);
        }

        .light-mode {
            --bg-dark: #f0f0f0;
            --bg-card: #ffffff;
            --bg-input: #f5f5f5;
            --primary: #c9922a;
            --text-light: #1a1a1a;
            --text-muted: #666;
            --border: #ddd;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            --glow: 0 0 30px rgba(201,146,42,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            background-image: 
                radial-gradient(ellipse at top, rgba(245,176,65,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(231,76,60,0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            transition: all 0.4s ease;
        }

        .card {
            background: var(--bg-card);
            padding: 45px;
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            color: var(--text-light);
            position: relative;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #000;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            box-shadow: 0 4px 15px rgba(245,176,65,0.4);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245,176,65,0.5);
        }

        h1 {
            color: var(--primary);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 35px;
            font-size: 26px;
            font-weight: 700;
            text-shadow: var(--glow);
        }

        h1 i { margin-right: 12px; }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea, select {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text-light);
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            resize: vertical;
        }

        textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(245,176,65,0.15);
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        select option {
            background: var(--bg-card);
            color: var(--text-light);
            padding: 10px;
        }

        .btns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        button {
            padding: 18px 25px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        button:active {
            transform: translateY(-1px);
        }

        .btn-gerar {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #1a1a1a;
            box-shadow: 0 8px 25px rgba(245,176,65,0.4);
        }

        .btn-pdf {
            background: linear-gradient(135deg, var(--success), #1e8449);
            color: #fff;
            box-shadow: 0 8px 25px rgba(39,174,96,0.3);
        }

        .btn-bd {
            background: linear-gradient(135deg, var(--info), #2471a3);
            color: #fff;
            box-shadow: 0 8px 25px rgba(52,152,219,0.3);
        }

        .btn-hist {
            background: linear-gradient(135deg, #8e44ad, #6c3483);
            color: #fff;
            box-shadow: 0 8px 25px rgba(142,68,173,0.3);
        }

        #saida {
            margin-top: 35px;
            padding: 30px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--bg-input), var(--bg-card));
            border: 2px solid var(--border);
            line-height: 1.9;
            font-size: 17px;
            min-height: 150px;
            color: var(--text-light);
            transition: all 0.3s ease;
        }

        #saida h2 {
            color: var(--primary);
            font-size: 22px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #saida hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), transparent);
            margin: 20px 0;
        }

        #saida strong {
            color: var(--primary);
        }

        .loading {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #modalHistorico {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            padding: 30px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            max-width: 750px;
            margin: 0 auto;
        }

        .btn-fechar {
            background: var(--accent);
            color: #fff;
            padding: 12px 25px;
            border-radius: 10px;
            float: right;
            margin-bottom: 25px;
            font-size: 14px;
        }

        #modalHistorico h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 24px;
        }

        .item-lista {
            background: var(--bg-input);
            border: 2px solid var(--border);
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .item-lista:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .item-lista strong {
            color: var(--primary);
            font-size: 15px;
        }

        .btn-acao {
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            background: var(--primary);
            color: #1a1a1a;
            font-weight: 600;
        }

        .empty-msg {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo-area img {
            max-height: 100px;
            max-width: 100%;
            object-fit: contain;
        }
        @media (max-width: 768px) {
            .card { padding: 30px 20px; }
            h1 { font-size: 20px; }
            .btns { grid-template-columns: 1fr; }
            .theme-toggle { top: 15px; right: 15px; padding: 8px 15px; font-size: 11px; }
            .logo-area img { max-height: 70px; }
        }
    </style>
</head>
<body>

<div class="card">
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fa-solid fa-moon"></i> TEMA
    </button>
    <div class="logo-area">
        <img src="https://docs.google.com/uc?export=download&id=17z9JPfC2-Y4iCTbOFNmZdWSQWlJVu-Wx" alt="Logo" onerror="this.style.display='none'">
    </div>
    <h1>GERADOR DE SERMÕES</h1>
    
    <label for="tema">Tema ou Versículo</label>
    <textarea id="tema" placeholder="Qual o tema ou versículo de hoje?" rows="3"></textarea>
    
    <label for="estiloReferencia">Estilo do Pregador</label>
    <select id="estiloReferencia">
        <option value="Pr. Cláudio Duarte">Pr. Cláudio Duarte</option>
        <option value="Pr. Isaias de Oliveira">Pr. Isaias de Oliveira</option>
        <option value="Pr. Hernandes Dias Lopes">Pr. Hernandes Dias Lopes</option>
        <option value="Pr. Juliano Fraga">Pr. Juliano Fraga</option>
        <option value="Pr. Oziel Gomes">Pr. Oziel Gomes</option>
        <option value="Miss. Edmeia Williams">Miss. Edmeia Williams</option>
        <option value="Prof. Matheus Zandona Guimarães">Prof. Matheus Zandona Guimarães</option>
    </select>

    <div class="btns">
        <button class="btn-gerar" onclick="gerarSermao()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> GERAR
        </button>
        <button class="btn-bd" onclick="salvarNoBanco()">
            <i class="fa-solid fa-cloud-arrow-up"></i> SALVAR BD
        </button>
        <button class="btn-hist" onclick="abrirHistorico()">
            <i class="fa-solid fa-clock-rotate-left"></i> HISTÓRICO
        </button>
        <button class="btn-pdf" onclick="baixarPDF()">
            <i class="fa-solid fa-file-pdf"></i> BAIXAR PDF
        </button>
    </div>
    
    <div id="saida">
        <p style="color: var(--text-muted); text-align: center; padding: 20px;">
            <i class="fa-solid fa-arrow-down"></i><br>
            O esboço do seu sermão aparecerá aqui...
        </p>
    </div>
</div>

<div id="modalHistorico">
    <div class="modal-content">
        <button class="btn-fechar" onclick="document.getElementById('modalHistorico').style.display='none'">
            <i class="fa-solid fa-xmark"></i> FECHAR
        </button>
        <div style="clear: both;"></div>
        <h2><i class="fa-solid fa-folder-open"></i> Meus Sermões Salvos</h2>
        <div id="listaSermoes"></div>
    </div>
</div>

<script>
    const KEY_GEMINI = 'AIzaSyD68vhQg8kv-cYUbRoC_v74GeRf9iZWL0o'; 
    const URL_WEB_APP = 'https://script.google.com/macros/s/AKfycbwodI-fHJpXAUQknpHb4oSkfxVpxW_7715DiQey6BAPTrSUOAq9W0fFtTTR7stnEKFP/exec';

    function toggleTheme() { 
        document.body.classList.toggle('light-mode');
        const icon = document.querySelector('.theme-toggle i');
        icon.classList.toggle('fa-moon');
        icon.classList.toggle('fa-sun');
    }

    async function gerarSermao() {
        const tema = document.getElementById('tema').value;
        const referencia = document.getElementById('estiloReferencia').value;
        const meuNome = "Cicero Daniel";

        if(!tema) return alert("Por favor, digite um tema!");
        document.getElementById('saida').innerHTML = `
            <div style="text-align: center; padding: 40px;">
                <i class="fa-solid fa-circle-notch loading fa-2x" style="color: var(--primary);"></i>
                <p style="margin-top: 20px; color: var(--text-muted);">Gerando e revisando...</p>
            </div>`;
        
        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${KEY_GEMINI}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    contents: [{ 
                        parts: [{ 
                            text: `Escreva um sermão completo sobre "${tema}" usando o estilo de pregação de ${referencia}. O texto deve ser escrito por ${meuNome}.` 
                        }] 
                    }] 
                })
            });
            
            const d = await resp.json();
            
            if (d.error) {
                throw new Error(d.error.message || "Erro da API");
            }
            if (!d.candidates || !d.candidates[0]) {
                throw new Error("Resposta inválida da IA");
            }
            
            let textoBruto = d.candidates[0].content.parts[0].text;

            const nomesProibidos = [
                "Pr. Cláudio Duarte", "Cláudio Duarte", 
                "Pr. Isaias de Oliveira", "Isaias de Oliveira",
                "Pr. Hernandes Dias Lopes", "Hernandes Dias Lopes",
                "Pr. Juliano Fraga", "Juliano Fraga",
                "Pr. Oziel Gomes", "Oziel Gomes",
                "Miss. Edmeia Williams", "Edmeia Williams", "Miss.",
                "Prof. Matheus Zandona Guimarães", "Matheus Zandona Guimarães", "Matheus Zandona", "Prof."
            ];

            let textoLimpo = textoBruto;
            
            // Substitui TODOS os nomes proibidos por Cicero Daniel
            nomesProibidos.forEach(nome => {
                const regex = new RegExp(nome, "gi");
                textoLimpo = textoLimpo.replace(regex, "Cicero Daniel");
            });

            const textoFinal = textoLimpo.trim().replace(/\n/g, '<br>');
            
            document.getElementById('saida').innerHTML = `
                <h2>${tema.toUpperCase()}</h2>
                <p><strong>Pregador:</strong> ${meuNome}</p>
                <hr>
                <p>${textoFinal}</p>`;
            
        } catch(e) { 
            console.error("Erro:", e);
            alert("Erro ao conectar com a IA: " + e.message); 
            document.getElementById('saida').innerHTML = '<p style="color: var(--accent);">Erro ao gerar. Tente novamente.</p>';
        }
    }

    async function salvarNoBanco() {
        const tema = document.getElementById('tema').value;
        const pregador = "Cicero Daniel"; 
        const sermao = document.getElementById('saida').innerHTML;
        if(sermao.length < 50) return alert("Gere um sermão antes de salvar!");
        
        fetch(URL_WEB_APP, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "create", tema, pregador, sermao }) });
        alert("Sermão salvo com sucesso!");
    }

    async function abrirHistorico() {
        document.getElementById('modalHistorico').style.display = 'block';
        const resp = await fetch(URL_WEB_APP + "?action=read");
        window.bancoDados = await resp.json();
        renderizarLista(window.bancoDados);
    }

    function renderizarLista(dados) {
        let html = "";
        dados.slice().reverse().forEach(s => {
            html += `<div class="item-lista">
                <div><strong>${s.tema}</strong></div>
                <button class="btn-acao" onclick="verSermao('${s.id}')">ABRIR</button>
            </div>`;
        });
        document.getElementById('listaSermoes').innerHTML = html || '<p class="empty-msg">Nenhum sermon salvo.</p>';
    }

    function verSermao(id) {
        const s = window.bancoDados.find(item => item.id === id);
        document.getElementById('saida').innerHTML = s.sermao;
        document.getElementById('modalHistorico').style.display = 'none';
    }

    function baixarPDF() {
        const element = document.getElementById('saida');
        html2pdf().from(element).save('Sermao_Cicero_Daniel.pdf');
    }
</script>
</body>
</html>
