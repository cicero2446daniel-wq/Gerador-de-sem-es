<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Gerador de Sermões Pro v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d0d0d; --bg-card: #1a1a1a; --bg-input: #252525;
            --primary: #f5b041; --primary-dark: #d4941c; --accent: #e74c3c;
            --text-light: #f0f0f0; --text-muted: #888; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg-dark); 
            color: var(--text-light); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
        }
        .card { 
            background: var(--bg-card); 
            padding: 30px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 800px; 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); 
            position: relative;
            height: fit-content;
        }
        .card::before { 
            content: ''; 
            position: absolute; 
            top: 0; left: 0; right: 0; 
            height: 4px; 
            background: linear-gradient(90deg, var(--primary), var(--accent)); 
            border-radius: 20px 20px 0 0; 
        }
        h1 { 
            color: var(--primary); 
            text-align: center; 
            margin-bottom: 6px; 
            letter-spacing: 3px; 
            font-size: 22px; 
            font-family: 'Cinzel', serif;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 28px;
        }
        label { 
            display: block; 
            color: var(--text-muted); 
            margin-bottom: 8px; 
            font-size: 11px; 
            text-transform: uppercase; 
            font-weight: 700;
            letter-spacing: 1px;
        }
        textarea, select { 
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 20px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: var(--bg-input); 
            color: #fff; 
            font-size: 15px; 
            outline: none; 
            font-family: 'Lato', sans-serif;
            transition: border-color 0.2s;
        }
        textarea:focus, select:focus { border-color: var(--primary); }
        select option { background: #252525; }
        .btns { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 10px; 
            margin-bottom: 0;
        }
        button { 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            transition: all 0.25s; 
            text-transform: uppercase; 
            font-size: 12px;
            font-family: 'Lato', sans-serif;
            letter-spacing: 0.5px;
        }
        .btn-gerar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #000; }
        .btn-hist { background: #8e44ad; color: #fff; }
        .btn-pdf { background: #27ae60; color: #fff; }
        .btn-bd { background: #2980b9; color: #fff; }
        button:hover { opacity: 0.85; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #saida { 
            margin-top: 24px; 
            padding: 24px; 
            background: linear-gradient(145deg, #1c1c1c, #141414); 
            border-radius: 14px; 
            line-height: 1.85; 
            border: 1px solid var(--border); 
            min-height: 160px;
            font-size: 15px;
        }
        #saida h2 {
            font-family: 'Cinzel', serif;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 18px;
        }
        #saida hr { border-color: #333; margin: 14px 0; }

        /* Streaming cursor */
        .cursor { 
            display: inline-block; 
            width: 2px; 
            height: 1em; 
            background: var(--primary); 
            margin-left: 2px; 
            vertical-align: middle;
            animation: blink 0.7s steps(1) infinite;
        }
        @keyframes blink { 0%,100% { opacity:1 } 50% { opacity:0 } }

        /* Modal */
        #modalHistorico { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); 
            z-index: 1000; 
            padding: 20px; 
            overflow-y: auto; 
            backdrop-filter: blur(6px); 
        }
        .modal-inner { max-width: 700px; margin: 40px auto; }
        .item-lista { 
            background: #252525; 
            padding: 16px 18px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border: 1px solid #333;
            transition: border-color 0.2s;
        }
        .item-lista:hover { border-color: var(--primary); }
        .item-lista strong { font-size: 14px; }
        .item-lista .item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .btn-excluir { 
            background: var(--accent); 
            color: white; 
            padding: 8px 12px; 
            border-radius: 8px; 
            font-size: 12px;
        }
        .btn-abrir {
            background: var(--primary); 
            color: #000; 
            padding: 8px 14px; 
            border-radius: 8px;
            font-size: 12px;
        }
        .spinner { 
            width: 36px; height: 36px;
            border: 3px solid rgba(245,176,65,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .tag-ia {
            display: inline-block;
            background: rgba(245,176,65,0.12);
            color: var(--primary);
            border: 1px solid rgba(245,176,65,0.25);
            border-radius: 20px;
            font-size: 10px;
            padding: 2px 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 22px;
            font-weight: 700;
        }

        @media(max-width: 500px) {
            .card { padding: 20px; }
            h1 { font-size: 18px; }
            .btns { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⛪ GERADOR DE SERMÕES</h1>
    <p class="subtitle">Powered by Inteligência Artificial</p>
    <div style="text-align:center"><span class="tag-ia">✦ Claude AI</span></div>

    <label>Tema ou Versículo</label>
    <textarea id="tema" placeholder="Sobre o que vamos pregar hoje? Ex: Fé que move montanhas (Mateus 17:20)" rows="3"></textarea>
    
    <label>Estilo de Referência</label>
    <select id="estiloReferencia">
        <option value="Pr. Cláudio Duarte">Pr. Cláudio Duarte</option>
        <option value="Pr. Hernandes Dias Lopes">Pr. Hernandes Dias Lopes</option>
        <option value="Pr. Isaias de Oliveira">Pr. Isaias de Oliveira</option>
        <option value="Miss. Edmeia Williams">Miss. Edmeia Williams</option>
    </select>

    <div class="btns">
        <button class="btn-gerar" id="btnGerar" onclick="gerarSermao()">
            <i class="fa-solid fa-wand-magic-sparkles"></i> GERAR
        </button>
        <button class="btn-bd" onclick="salvarNoBanco()">
            <i class="fa-solid fa-cloud-arrow-up"></i> SALVAR
        </button>
        <button class="btn-hist" onclick="abrirHistorico()">
            <i class="fa-solid fa-clock-rotate-left"></i> HISTÓRICO
        </button>
        <button class="btn-pdf" onclick="baixarPDF()">
            <i class="fa-solid fa-file-pdf"></i> PDF
        </button>
    </div>
    
    <div id="saida">
        <p style="text-align:center; color:var(--text-muted); padding: 30px 0;">
            <i class="fa-solid fa-dove" style="font-size:28px; opacity:0.3; display:block; margin-bottom:12px;"></i>
            O rascunho do sermão aparecerá aqui após clicar em Gerar.
        </p>
    </div>
</div>

<!-- Modal Histórico -->
<div id="modalHistorico">
    <div class="modal-inner">
        <button style="background:var(--accent); color:#fff; margin-bottom:20px; width:120px;" 
                onclick="document.getElementById('modalHistorico').style.display='none'">
            <i class="fa-solid fa-xmark"></i> FECHAR
        </button>
        <h2 style="color:var(--primary); margin-bottom:20px; font-family:'Cinzel',serif; letter-spacing:2px;">
            Histórico de Mensagens
        </h2>
        <div id="listaSermoes"></div>
    </div>
</div>

<script>
    // ══════════════════════════════════════════════
    //  CONFIGURAÇÕES
    // ══════════════════════════════════════════════
    const MEU_NOME = "Cicero Daniel";
    const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbwodI-fHJpXAUQknpHb4oSkfxVpxW_7715DiQey6BAPTrSUOAq9W0fFtTTR7stnEKFP/exec";

    // Nomes a substituir no texto gerado
    const NOMES_PROIBIDOS = ["Pr. Cláudio Duarte", "Cláudio Duarte", "Isaias de Oliveira", 
                              "Hernandes Dias Lopes", "Edmeia Williams"];

    // ══════════════════════════════════════════════
    //  GERAR SERMÃO — usa API da Anthropic (Claude)
    // ══════════════════════════════════════════════
    async function gerarSermao() {
        const tema = document.getElementById('tema').value.trim();
        const referencia = document.getElementById('estiloReferencia').value;

        if (!tema) return alert("Por favor, digite um tema ou versículo!");

        const btnGerar = document.getElementById('btnGerar');
        btnGerar.disabled = true;
        btnGerar.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> GERANDO...';

        document.getElementById('saida').innerHTML = `
            <div style="text-align:center; padding:40px 20px;">
                <div class="spinner"></div>
                <p style="color:var(--text-muted); font-size:14px;">Preparando sermão com inteligência artificial...</p>
            </div>`;

        const prompt = `Você é um pregador cristão experiente e ungido. Escreva um sermão completo e poderoso sobre o tema/versículo: "${tema}".

Escreva no estilo de pregação inspirado em ${referencia}, com linguagem impactante, clara e edificante.

O sermão deve conter:
1. Título impactante
2. Introdução envolvente com contexto bíblico
3. Pelo menos 3 pontos principais com versículos bíblicos
4. Ilustrações e aplicações práticas
5. Conclusão com apelo ao coração
6. Ao final, assine como: Pr. ${MEU_NOME}

Escreva em português brasileiro. Use linguagem que toque o coração das pessoas.`;

        try {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "anthropic-version": "2023-06-01",
                    "anthropic-dangerous-direct-browser-access": "true"
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 2500,
                    messages: [
                        { role: "user", content: prompt }
                    ]
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || `Erro HTTP ${response.status}`);
            }

            const data = await response.json();
            let texto = data.content[0].text;

            // Substituir nomes de referência pelo pregador real
            NOMES_PROIBIDOS.forEach(nome => {
                const regex = new RegExp(nome, "gi");
                texto = texto.replace(regex, MEU_NOME);
            });

            // Formatar para HTML
            const textoHTML = texto
                .split('\n')
                .map(line => {
                    if (!line.trim()) return '<br>';
                    // Títulos e pontos em negrito
                    if (/^#{1,3}\s/.test(line)) {
                        return `<h3 style="color:var(--primary); margin:16px 0 8px; font-family:'Cinzel',serif;">${line.replace(/^#{1,3}\s/, '')}</h3>`;
                    }
                    if (/^\*\*(.+)\*\*$/.test(line)) {
                        return `<h3 style="color:var(--primary); margin:14px 0 6px;">${line.replace(/\*\*/g,'')}</h3>`;
                    }
                    return `<p style="margin-bottom:8px;">${line.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/\*(.+?)\*/g, '<em>$1</em>')}</p>`;
                })
                .join('');

            document.getElementById('saida').innerHTML = `
                <h2>${tema.toUpperCase()}</h2>
                <p style="color:var(--text-muted); font-size:13px; margin-bottom:6px;">
                    <i class="fa-solid fa-microphone" style="margin-right:6px;"></i>
                    Estilo: ${referencia}
                </p>
                <hr>
                <div style="margin-top:16px;">${textoHTML}</div>`;

        } catch (e) {
            console.error("Erro:", e);
            document.getElementById('saida').innerHTML = `
                <div style="text-align:center; padding:30px;">
                    <i class="fa-solid fa-triangle-exclamation" style="color:var(--accent); font-size:28px; margin-bottom:12px; display:block;"></i>
                    <p style="color:var(--accent); font-weight:bold;">Erro ao gerar sermão</p>
                    <p style="color:var(--text-muted); font-size:13px; margin-top:8px;">${e.message}</p>
                </div>`;
        } finally {
            btnGerar.disabled = false;
            btnGerar.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> GERAR';
        }
    }

    // ══════════════════════════════════════════════
    //  SALVAR NO BANCO (Google Sheets)
    // ══════════════════════════════════════════════
    async function salvarNoBanco() {
        const tema = document.getElementById('tema').value;
        const sermao = document.getElementById('saida').innerHTML;
        if (sermao.length < 100 || sermao.includes('aparecerá aqui') || sermao.includes('Erro ao gerar')) {
            return alert("Gere um sermão antes de salvar!");
        }

        fetch(URL_WEB_APP, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "create", tema: tema || "Sem Título", pregador: MEU_NOME, sermao })
        });
        alert("✅ Sermão enviado para o banco de dados!");
    }

    // ══════════════════════════════════════════════
    //  HISTÓRICO
    // ══════════════════════════════════════════════
    async function abrirHistorico() {
        const modal = document.getElementById('modalHistorico');
        const lista = document.getElementById('listaSermoes');
        modal.style.display = 'block';
        lista.innerHTML = '<p style="color:var(--text-muted); text-align:center; padding:20px;"><i class="fa-solid fa-circle-notch fa-spin"></i> Buscando dados...</p>';

        try {
            const resp = await fetch(URL_WEB_APP + "?action=read");
            const dados = await resp.json();
            window.bancoDados = dados;

            let html = "";
            dados.slice().reverse().forEach(s => {
                html += `
                <div class="item-lista" id="item-${s.id}">
                    <div style="flex:1; cursor:pointer" onclick="verSermao('${s.id}')">
                        <strong>${s.tema || 'Sem título'}</strong>
                        <div class="item-date">${s.pregador || MEU_NOME}</div>
                    </div>
                    <div style="display:flex; gap:8px; margin-left:10px;">
                        <button class="btn-abrir" onclick="verSermao('${s.id}')">ABRIR</button>
                        <button class="btn-excluir" onclick="deletarSermao('${s.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });

            lista.innerHTML = html || '<p style="color:var(--text-muted); text-align:center; padding:20px;">Nenhum registro encontrado.</p>';
        } catch (e) {
            lista.innerHTML = '<p style="color:var(--accent); text-align:center; padding:20px;">Erro ao carregar histórico. Verifique a conexão.</p>';
        }
    }

    async function deletarSermao(id) {
        if (!confirm("Tem certeza que deseja remover este item?")) return;
        const el = document.getElementById(`item-${id}`);
        if (el) el.style.opacity = '0.3';
        fetch(URL_WEB_APP, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ action: "delete", id: id })
        });
        setTimeout(() => { if(el) el.remove(); }, 500);
    }

    function verSermao(id) {
        const s = window.bancoDados?.find(x => x.id == id);
        if (s) {
            document.getElementById('saida').innerHTML = s.sermao;
            document.getElementById('modalHistorico').style.display = 'none';
        }
    }

    // ══════════════════════════════════════════════
    //  EXPORTAR PDF
    // ══════════════════════════════════════════════
    function baixarPDF() {
        const element = document.getElementById('saida');
        if (element.innerHTML.includes('aparecerá aqui')) {
            return alert("Gere um sermão antes de exportar!");
        }
        const opt = {
            margin: 12,
            filename: `Sermão_${MEU_NOME}_${Date.now()}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#1a1a1a' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // Atalho de teclado: Ctrl+Enter para gerar
    document.getElementById('tema').addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'Enter') gerarSermao();
    });
</script>
</body>
</html>
