<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador de Sermões Pro v3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --bg: #0b0b0b; --gold: #c5a059; --card: #161616; --text: #f0f0f0; --input: #252525; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; -webkit-font-smoothing: antialiased; }

        .container { max-width: 600px; margin: auto; background: var(--card); border: 1px solid var(--gold); border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); position: relative; box-sizing: border-box; }

        h1 { color: var(--gold); text-align: center; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }

        label { display: block; color: #888; font-size: 11px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; margin-bottom: 6px; }

        textarea, select {
            width: 100%; padding: 16px; background: var(--input); color: white;
            border: 1px solid #444; border-radius: 12px; margin-bottom: 15px;
            font-size: 17px; outline: none; box-sizing: border-box; resize: none;
            font-family: 'Segoe UI', sans-serif;
        }
        textarea:focus, select:focus { border-color: var(--gold); }
        select option { background: #252525; }

        .btn-gerar {
            width: 100%; padding: 20px; background: var(--gold); color: #000;
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            font-size: 17px; text-transform: uppercase;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: 0.3s; margin-bottom: 12px;
        }
        .btn-gerar:active { transform: scale(0.98); }
        .btn-gerar:disabled { background: #444; color: #888; cursor: not-allowed; }

        .btns-secundarios {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 5px;
        }
        .btn-sec {
            padding: 14px; border: none; border-radius: 12px; cursor: pointer;
            font-weight: bold; font-size: 13px; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            transition: 0.2s;
        }
        .btn-sec:active { transform: scale(0.97); }
        .btn-salvar  { background: #2980b9; color: #fff; }
        .btn-hist    { background: #8e44ad; color: #fff; }
        .btn-pdf     { background: #27ae60; color: #fff; }

        #roteiro {
            margin-top: 20px; padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px; border-left: 5px solid var(--gold);
            line-height: 1.85; font-size: 18px; color: #ddd;
            white-space: pre-wrap; min-height: 80px;
        }
        #roteiro b { color: var(--gold); font-weight: 700; }
        #roteiro h2 { color: var(--gold); margin-bottom: 6px; font-size: 20px; }
        #roteiro hr { border-top: 1px solid #333; margin: 16px 0; }

        .settings-btn {
            position: absolute; top: 20px; right: 20px; color: var(--gold);
            cursor: pointer; font-size: 20px; z-index: 10; display: flex; align-items: center;
        }
        .key-badge {
            position: absolute; top: -5px; right: -5px;
            width: 11px; height: 11px; border-radius: 50%;
            border: 2px solid var(--card); display: none;
        }
        .key-badge.alert { background: #e74c3c; display: block; }
        .key-badge.ok    { background: #2ecc71; display: block; }

        #config-panel {
            display: none; background: #1a1a1a; padding: 18px; border-radius: 12px;
            margin-bottom: 15px; border: 1px solid var(--gold); animation: fadeIn 0.3s;
        }
        #config-panel label { color: var(--gold); font-size: 12px; margin-bottom: 8px; display:block; }

        .key-status-bar {
            display: flex; align-items: center; gap: 8px;
            background: #111; border-radius: 8px; padding: 10px 14px;
            margin-bottom: 12px; font-size: 13px;
        }
        .key-status-bar .dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .status-ok    .dot { background: #2ecc71; }
        .status-alert .dot { background: #e74c3c; }
        .status-none  .dot { background: #888; }
        .key-status-bar span { color: #aaa; }

        #modalHistorico {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.94); z-index: 1000;
            padding: 20px; overflow-y: auto; backdrop-filter: blur(6px);
        }
        .modal-inner { max-width: 600px; margin: 30px auto; }
        .item-lista {
            background: #1a1a1a; padding: 16px 18px; border-radius: 12px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid #333; transition: 0.2s;
        }
        .item-lista:hover { border-color: var(--gold); }
        .item-lista strong { color: var(--gold); font-size: 15px; }
        .item-data { font-size: 11px; color: #666; margin-top: 2px; }
        .btn-abrir  { background: var(--gold); color: #000; padding: 8px 14px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-excluir { background: #e74c3c; color: white; padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; }

        .history-section { margin-top: 30px; max-width: 600px; margin-left: auto; margin-right: auto; border-top: 1px solid #333; padding-top: 20px; }
        .history-item { background: #1a1a1a; padding: 16px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .history-item:hover { border-color: var(--gold); }
        .badge { background: var(--gold); color: black; padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media(max-width: 420px) {
            h1 { font-size: 1.4rem; }
            .btns-secundarios { grid-template-columns: 1fr 1fr; }
            .btn-pdf { grid-column: span 2; }
        }
    </style>
</head>
<body onload="inicializarApp()">

<div class="container">
    <div class="settings-btn" onclick="toggleConfig()" title="Configurações da API" style="position:absolute; top:20px; right:20px;">
        <i class="fa-solid fa-cog"></i>
        <span class="key-badge" id="key-badge"></span>
    </div>

    <h1><i class="fa-solid fa-bible"></i> Sermões Pro</h1>
    <p style="text-align:center; font-size:14px; color:#888; margin-bottom:20px;">Pregador: Cicero Daniel</p>

    <!-- Painel de configuração -->
    <div id="config-panel">
        <label><i class="fa-solid fa-key"></i> &nbsp;CHAVE API GEMINI</label>

        <!-- Status atual -->
        <div class="key-status-bar status-none" id="key-status-bar">
            <span class="dot"></span>
            <span id="key-status-text">Verificando...</span>
        </div>

        <input type="password" id="api-key-input"
               style="width:100%; background:#000; color:#00ff00; border:1px solid #444; padding:12px; border-radius:8px; margin-bottom:10px; box-sizing:border-box; font-size:14px; font-family:monospace; letter-spacing:1px;"
               placeholder="Cole sua chave do Google AI Studio aqui..."
               oninput="document.getElementById('btn-salvar-chave').style.background='#c5a059'">

        <div style="display:flex; gap:8px;">
            <button id="btn-salvar-chave" onclick="saveKey()"
                    style="flex:1; background:var(--gold); border:none; padding:13px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px; transition:0.2s;">
                <i class="fa-solid fa-floppy-disk"></i> SALVAR CHAVE
            </button>
            <button onclick="removerChave()" title="Apagar chave salva"
                    style="background:#c0392b; border:none; padding:13px 16px; border-radius:8px; cursor:pointer; color:#fff; font-size:15px;">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>

        <p style="color:#555; font-size:11px; margin-top:10px; text-align:center; line-height:1.6;">
            Chave gratuita em <strong style="color:var(--gold)">aistudio.google.com</strong><br>
            <span style="color:#444;">A chave é armazenada apenas neste dispositivo.</span>
        </p>
    </div>

    <label>Tema ou Versículo</label>
    <textarea id="tema" placeholder="Sobre o que vamos pregar hoje? Ex: Fé que move montanhas (Mateus 17:20)" rows="3"></textarea>

    <label>Estilo de Referência</label>
    <select id="estiloReferencia">
        <option value="Pr. Cláudio Duarte">Pr. Cláudio Duarte</option>
        <option value="Pr. Hernandes Dias Lopes">Pr. Hernandes Dias Lopes</option>
        <option value="Pr. Isaias de Oliveira">Pr. Isaias de Oliveira</option>
        <option value="Miss. Edmeia Williams">Miss. Edmeia Williams</option>
    </select>

    <button id="btn-main" class="btn-gerar" onclick="gerarSermao()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> GERAR SERMÃO
    </button>

    <div class="btns-secundarios">
        <button class="btn-sec btn-salvar" onclick="salvarNoBanco()">
            <i class="fa-solid fa-cloud-arrow-up"></i> SALVAR
        </button>
        <button class="btn-sec btn-hist" onclick="abrirHistorico()">
            <i class="fa-solid fa-clock-rotate-left"></i> HISTÓRICO
        </button>
        <button class="btn-sec btn-pdf" onclick="baixarPDF()">
            <i class="fa-solid fa-file-pdf"></i> PDF
        </button>
    </div>

    <div id="roteiro">
        <div style="text-align:center; color:#555; padding:20px 0;">
            <i class="fa-solid fa-dove" style="font-size:28px; display:block; margin-bottom:10px; opacity:0.4;"></i>
            O sermão gerado aparecerá aqui...
        </div>
    </div>
</div>

<!-- Histórico local -->
<div class="history-section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <span style="color:var(--gold); font-weight:bold;">
            <i class="fa-solid fa-clock-rotate-left"></i> SALVOS RECENTEMENTE
        </span>
        <button onclick="limparHistorico()" style="background:none; border:none; color:#ff6b6b; cursor:pointer; font-size:12px;">LIMPAR</button>
    </div>
    <div id="lista-historico"></div>
</div>

<!-- Modal histórico nuvem -->
<div id="modalHistorico">
    <div class="modal-inner">
        <button onclick="document.getElementById('modalHistorico').style.display='none'"
                style="background:#e74c3c; color:#fff; border:none; padding:12px 20px; border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:20px;">
            <i class="fa-solid fa-xmark"></i> FECHAR
        </button>
        <h2 style="color:var(--gold); margin-bottom:20px; letter-spacing:2px;">Histórico na Nuvem</h2>
        <div id="listaSermoes"></div>
    </div>
</div>

<script>
    const MEU_NOME    = "Cicero Daniel";
    const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbwodI-fHJpXAUQknpHb4oSkfxVpxW_7715DiQey6BAPTrSUOAq9W0fFtTTR7stnEKFP/exec";
    const NOMES_PROIBIDOS = ["Pr. Cláudio Duarte","Cláudio Duarte","Isaias de Oliveira","Hernandes Dias Lopes","Edmeia Williams"];

    let MINHA_CHAVE = localStorage.getItem('sermoespro_key') || "";

    // ── Init ──
    function inicializarApp() {
        atualizarInterfaceHistorico();
        // Atualiza o badge da engrenagem conforme estado da chave
        const badge = document.getElementById('key-badge');
        if (MINHA_CHAVE) {
            badge.className = 'key-badge ok';
        } else {
            badge.className = 'key-badge alert';
            document.getElementById('roteiro').innerHTML = `
                <div style="color:orange; text-align:center; padding:20px;">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size:28px; display:block; margin-bottom:10px;"></i>
                    Olá, ${MEU_NOME}!<br>Configure sua chave API na engrenagem ⚙️ para começar.
                </div>`;
        }
    }

    // ── Config ──
    function atualizarStatusChave(estado) {
        // estado: 'ok' | 'alert' | 'none'
        const bar    = document.getElementById('key-status-bar');
        const txt    = document.getElementById('key-status-text');
        const badge  = document.getElementById('key-badge');
        const msgs   = { ok: '✅ Chave ativa', alert: '❌ Chave inválida ou expirada', none: '⚠️ Nenhuma chave configurada' };
        bar.className = 'key-status-bar status-' + estado;
        txt.textContent = msgs[estado];
        badge.className = 'key-badge ' + (estado === 'ok' ? 'ok' : 'alert');
    }

    function toggleConfig() {
        const p = document.getElementById('config-panel');
        const aberto = p.style.display === 'block';
        p.style.display = aberto ? 'none' : 'block';
        if (!aberto) {
            // Ao abrir: preenche campo se já há chave, e mostra status
            const input = document.getElementById('api-key-input');
            if (MINHA_CHAVE) input.value = MINHA_CHAVE;
            atualizarStatusChave(MINHA_CHAVE ? 'ok' : 'none');
        }
    }

    function saveKey() {
        const k = document.getElementById('api-key-input').value.trim();
        if (!k) { alert("Cole uma chave válida antes de salvar!"); return; }
        localStorage.setItem('sermoespro_key', k);
        MINHA_CHAVE = k;
        atualizarStatusChave('ok');
        document.getElementById('config-panel').style.display = 'none';
        inicializarApp();
    }

    function removerChave() {
        if (!confirm("Deseja realmente apagar a chave API salva?")) return;
        localStorage.removeItem('sermoespro_key');
        MINHA_CHAVE = "";
        document.getElementById('api-key-input').value = "";
        atualizarStatusChave('none');
        inicializarApp();
    }

    // ── Gerar Sermão (Gemini) ──
    async function gerarSermao() {
        const tema       = document.getElementById('tema').value.trim();
        const referencia = document.getElementById('estiloReferencia').value;
        const display    = document.getElementById('roteiro');
        const btn        = document.getElementById('btn-main');

        if (!MINHA_CHAVE) { alert("Configure sua chave API primeiro!"); toggleConfig(); return; }
        if (!tema)         { alert("Insira um tema ou versículo!"); return; }

        btn.disabled = true;
        btn.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin'></i> GERANDO SERMÃO...";
        display.innerHTML = "<div style='text-align:center; padding:30px; color:#888;'><i class='fa-solid fa-circle-notch fa-spin' style='font-size:28px; color:var(--gold);'></i><br><br>Preparando sermão premium...</div>";

        const instrucao = `Você é um pregador cristão experiente e ungido, com o estilo inspirado em ${referencia}.
Escreva um sermão completo e poderoso sobre: "${tema}".
O sermão deve ser assinado por ${MEU_NOME} (não mencione o nome de referência em nenhum momento).

Use a seguinte estrutura com estes títulos exatos em negrito:
**TÍTULO:** (um título impactante e memorável)
**INTRODUÇÃO:** (contexto bíblico envolvente, 2-3 parágrafos)
**PONTO 1:** (com versículo bíblico e explicação objetiva)
**PONTO 2:** (com versículo bíblico e ilustração prática do cotidiano)
**PONTO 3:** (com versículo bíblico e aplicação concreta para a vida)
**CONCLUSÃO:** (apelo ao coração com chamado à decisão)
**Pregador: ${MEU_NOME}**

Escreva em português brasileiro. Linguagem clara, impactante e que toque o coração das pessoas.`;

        // ── Modelos em ordem de preferência — fallback automático ──
        // Se um modelo estiver sobrecarregado ou com quota, tenta o próximo automaticamente
        const MODELOS = [
            { id: 'gemini-2.5-flash-preview-05-20', label: 'Gemini 2.5 Flash' },
            { id: 'gemini-2.5-flash',               label: 'Gemini 2.5 Flash' },
            { id: 'gemini-2.0-flash',               label: 'Gemini 2.0 Flash' },
            { id: 'gemini-2.0-flash-lite',          label: 'Gemini 2.0 Flash Lite' },
            { id: 'gemini-1.5-pro',                 label: 'Gemini 1.5 Pro' },
            { id: 'gemini-1.5-flash',               label: 'Gemini 1.5 Flash' },
            { id: 'gemini-1.5-flash-8b',            label: 'Gemini 1.5 Flash 8B' }
        ];

        const delay = ms => new Promise(r => setTimeout(r, ms));

        // Detecta se é REALMENTE erro de chave inválida (não de quota/modelo)
        function isErroChaveReal(status, data) {
            const msg = (data.error?.message || '').toLowerCase();
            const errStatus = data.error?.status || '';
            // 401 é sempre chave inválida
            if (status === 401) return true;
            // 403 só é chave inválida se a mensagem mencionar explicitamente a key
            if (status === 403 && (msg.includes('api key not valid') || msg.includes('api key expired') || msg.includes('invalid api key'))) return true;
            // UNAUTHENTICATED = chave inválida de fato
            if (errStatus === 'UNAUTHENTICATED') return true;
            return false;
        }

        // Detecta sobrecarga/quota (deve tentar próximo modelo)
        function isSobrecarga(status, data) {
            const msg = (data.error?.message || '').toLowerCase();
            const errStatus = data.error?.status || '';
            if (status === 503 || status === 429) return true;
            if (errStatus === 'UNAVAILABLE' || errStatus === 'RESOURCE_EXHAUSTED') return true;
            if (msg.includes('high demand') || msg.includes('overloaded') || msg.includes('quota')) return true;
            return false;
        }

        // Detecta modelo indisponível nesta chave (tenta próximo, mas NÃO é erro de chave)
        function isModeloIndisponivel(status, data) {
            const msg = (data.error?.message || '').toLowerCase();
            const errStatus = data.error?.status || '';
            // 400 INVALID_ARGUMENT pode ser modelo não acessível, não chave errada
            if ((status === 400 || status === 403) && (errStatus === 'INVALID_ARGUMENT' || errStatus === 'PERMISSION_DENIED' || msg.includes('not found') || msg.includes('not supported') || msg.includes('preview'))) return true;
            return false;
        }

        let textoFinal = null;
        let ultimoErro = null;
        let modeloUsado = '';
        let authFailed  = false;

        for (let m = 0; m < MODELOS.length; m++) {
            if (authFailed) break;
            const { id: modelo, label: modeloLabel } = MODELOS[m];

            // Tenta até 2 vezes por modelo em caso de sobrecarga
            for (let tentativa = 1; tentativa <= 2; tentativa++) {
                try {
                    display.innerHTML = `<div style='text-align:center; padding:30px; color:#888;'>
                        <i class='fa-solid fa-circle-notch fa-spin' style='font-size:28px; color:var(--gold);'></i>
                        <br><br>
                        <span style='font-size:13px;'>
                            Tentando: <b style='color:var(--gold)'>${modeloLabel}</b>
                            ${tentativa > 1 ? ' <span style="color:#f39c12;">— retry ' + tentativa + '</span>' : ''}
                        </span>
                        <br><span style='font-size:11px; color:#555; margin-top:6px; display:block;'>${m + 1} de ${MODELOS.length} opções disponíveis</span>
                    </div>`;

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelo}:generateContent?key=${MINHA_CHAVE}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: instrucao }] }] })
                    });

                    const data = await response.json();

                    // ── Chave REALMENTE inválida — para tudo ──
                    if (isErroChaveReal(response.status, data)) {
                        authFailed = true;
                        throw { tipo: 'AUTH', msg: data.error?.message || 'Chave inválida ou expirada.' };
                    }

                    // ── Modelo indisponível nesta chave — pula para próximo modelo ──
                    if (isModeloIndisponivel(response.status, data)) {
                        ultimoErro = { tipo: 'MODELO', msg: `Modelo ${modeloLabel} não disponível.` };
                        break; // vai pro próximo modelo
                    }

                    // ── Sobrecarga — retry e depois próximo modelo ──
                    if (isSobrecarga(response.status, data)) {
                        ultimoErro = { tipo: 'SOBRECARGA', msg: data.error?.message || 'Servidor sobrecarregado.' };
                        if (tentativa < 2) {
                            display.innerHTML = `<div style='text-align:center; padding:20px; color:#f39c12;'>
                                <i class='fa-solid fa-circle-notch fa-spin'></i>
                                <b style='color:var(--gold)'>${modeloLabel}</b> ocupado — tentando novamente em 4s...
                            </div>`;
                            await delay(4000);
                        }
                        continue;
                    }

                    if (data.error) throw { tipo: 'GERAL', msg: data.error.message };

                    textoFinal = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textoFinal) throw { tipo: 'GERAL', msg: 'Resposta vazia do servidor.' };
                    modeloUsado = modeloLabel;
                    break; // ✅ sucesso!

                } catch (e) {
                    if (e.tipo === 'AUTH' || authFailed) {
                        // Chave inválida confirmada — exibe erro e para
                        atualizarStatusChave('alert');
                        document.getElementById('key-badge').className = 'key-badge alert';
                        display.innerHTML = `
                            <div style="text-align:center; padding:20px; color:#e74c3c;">
                                <i class="fa-solid fa-key" style="font-size:28px; display:block; margin-bottom:10px;"></i>
                                <b>Chave API inválida ou expirada</b><br>
                                <span style="font-size:13px; color:#888; display:block; margin:8px 0;">${e.msg}</span>
                                <span style="font-size:11px; color:#555; display:block; margin-bottom:12px;">
                                    Acesse <b style="color:var(--gold)">aistudio.google.com</b>, gere uma nova chave e cole abaixo.
                                </span>
                                <button onclick="toggleConfig()" style="background:var(--gold); border:none; padding:11px 22px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px;">
                                    <i class="fa-solid fa-key"></i> Inserir Nova Chave
                                </button>
                            </div>`;
                        document.getElementById('config-panel').style.display = 'block';
                        document.getElementById('api-key-input').value = '';
                        atualizarStatusChave('alert');
                        btn.disabled = false;
                        btn.innerHTML = "<i class='fa-solid fa-wand-magic-sparkles'></i> GERAR SERMÃO";
                        return;
                    }
                    ultimoErro = e;
                    break; // erro neste modelo, tenta próximo
                }
            }
            if (textoFinal) break;
            // Pausa antes do próximo modelo
            if (m < MODELOS.length - 1 && !authFailed) await delay(1000);
        }

        if (!textoFinal) {
            // Todos os modelos falharam
            const isSobrecargaFinal = ultimoErro?.tipo === 'SOBRECARGA' || ultimoErro?.tipo === 'MODELO' ||
                (ultimoErro?.msg && ultimoErro.msg.toLowerCase().includes('demand'));
            display.innerHTML = isSobrecargaFinal
                ? `<div style="text-align:center; padding:20px; color:#f39c12;">
                    <i class="fa-solid fa-server" style="font-size:28px; display:block; margin-bottom:10px;"></i>
                    <b>Servidores do Google sobrecarregados</b><br>
                    <span style="font-size:13px; color:#888; display:block; margin:8px 0;">
                        Todos os 7 modelos disponíveis estão com alta demanda agora.<br>
                        Isso é temporário — aguarde alguns minutos e tente novamente.
                    </span>
                    <button onclick="gerarSermao()" style="margin-top:12px; background:#f39c12; border:none; padding:11px 22px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:14px; color:#000;">
                        <i class="fa-solid fa-rotate-right"></i> Tentar Novamente
                    </button>
                  </div>`
                : `<div style="text-align:center; padding:20px; color:#e74c3c;">
                    <i class="fa-solid fa-triangle-exclamation" style="font-size:28px; display:block; margin-bottom:10px;"></i>
                    <b>Erro inesperado</b><br>
                    <span style="font-size:13px; color:#888;">${ultimoErro?.msg || 'Tente novamente.'}</span>
                  </div>`;
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-wand-magic-sparkles'></i> GERAR SERMÃO";
            return;
        }

        // ── Sucesso ──
        NOMES_PROIBIDOS.forEach(nome => {
            textoFinal = textoFinal.replace(new RegExp(nome, "gi"), MEU_NOME);
        });
        const textoFormatado = textoFinal.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

        display.innerHTML = `
            <div style="text-align:center; margin-bottom:16px;">
                <h2 style="margin:0; color:var(--gold); font-size:20px; text-transform:uppercase;">${tema}</h2>
                <p style="margin:6px 0 0; font-size:13px; color:#888;">
                    Pregador: ${MEU_NOME} &nbsp;|&nbsp; Estilo: ${referencia}
                </p>
                <p style="margin:4px 0 0; font-size:11px; color:#555;">Gerado com ${modeloUsado}</p>
            </div>
            <hr style="border-top:1px solid #333; margin-bottom:16px;">
            ${textoFormatado}`;

        salvarNoHistorico(tema.toUpperCase(), display.innerHTML);

        btn.disabled = false;
        btn.innerHTML = "<i class='fa-solid fa-wand-magic-sparkles'></i> GERAR SERMÃO";
    }

    // ── Histórico Local ──
    function salvarNoHistorico(titulo, conteudo) {
        const h = JSON.parse(localStorage.getItem('hist_sermoes_v3') || '[]');
        const data = new Date().toLocaleDateString('pt-BR');
        h.unshift({ titulo, conteudo, data });
        if (h.length > 10) h.pop();
        localStorage.setItem('hist_sermoes_v3', JSON.stringify(h));
        atualizarInterfaceHistorico();
    }

    function atualizarInterfaceHistorico() {
        const div = document.getElementById('lista-historico');
        const h = JSON.parse(localStorage.getItem('hist_sermoes_v3') || '[]');
        div.innerHTML = h.map((item, idx) => `
            <div class="history-item" onclick="verHistoricoLocal(${idx})">
                <span class="badge">${item.data}</span><br>
                <strong style="color:var(--gold); font-size:17px;">${item.titulo}</strong>
            </div>
        `).join('') || '<p style="color:#555; text-align:center;">Nenhum sermão salvo ainda.</p>';
    }

    function verHistoricoLocal(i) {
        const h = JSON.parse(localStorage.getItem('hist_sermoes_v3') || '[]');
        document.getElementById('roteiro').innerHTML = h[i].conteudo;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function limparHistorico() {
        if (confirm("Apagar todo o histórico local?")) {
            localStorage.removeItem('hist_sermoes_v3');
            atualizarInterfaceHistorico();
        }
    }

    // ── Salvar na Nuvem ──
    async function salvarNoBanco() {
        const tema   = document.getElementById('tema').value;
        const sermao = document.getElementById('roteiro').innerHTML;
        if (sermao.length < 100 || sermao.includes('aparecerá aqui') || sermao.includes('Configure') || sermao.includes('Olá')) {
            return alert("Gere um sermão antes de salvar na nuvem!");
        }
        fetch(URL_WEB_APP, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ action: "create", tema: tema || "Sem Título", pregador: MEU_NOME, sermao })
        });
        alert("✅ Sermão enviado para a nuvem!");
    }

    // ── Histórico Nuvem ──
    async function abrirHistorico() {
        const modal = document.getElementById('modalHistorico');
        const lista = document.getElementById('listaSermoes');
        modal.style.display = 'block';
        lista.innerHTML = '<p style="color:#888; text-align:center; padding:20px;"><i class="fa-solid fa-circle-notch fa-spin"></i> Buscando...</p>';

        try {
            const resp  = await fetch(URL_WEB_APP + "?action=read");
            const dados = await resp.json();
            window.bancoDados = dados;

            lista.innerHTML = dados.length
                ? dados.slice().reverse().map(s => `
                    <div class="item-lista" id="item-${s.id}">
                        <div style="flex:1; cursor:pointer;" onclick="verSermaoBanco('${s.id}')">
                            <strong>${s.tema || 'Sem título'}</strong>
                            <div class="item-data">${s.pregador || MEU_NOME}</div>
                        </div>
                        <div style="display:flex; gap:8px; margin-left:10px;">
                            <button class="btn-abrir" onclick="verSermaoBanco('${s.id}')">ABRIR</button>
                            <button class="btn-excluir" onclick="deletarSermao('${s.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`).join('')
                : '<p style="color:#555; text-align:center; padding:20px;">Nenhum registro na nuvem.</p>';

        } catch (e) {
            lista.innerHTML = '<p style="color:#e74c3c; text-align:center; padding:20px;">Erro ao carregar histórico da nuvem.</p>';
        }
    }

    function verSermaoBanco(id) {
        const s = window.bancoDados?.find(x => x.id == id);
        if (s) {
            document.getElementById('roteiro').innerHTML = s.sermao;
            document.getElementById('modalHistorico').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    async function deletarSermao(id) {
        if (!confirm("Remover este sermão da nuvem?")) return;
        const el = document.getElementById(`item-${id}`);
        if (el) el.style.opacity = '0.3';
        fetch(URL_WEB_APP, {
            method: "POST", mode: "no-cors",
            body: JSON.stringify({ action: "delete", id })
        });
        setTimeout(() => el?.remove(), 500);
    }

    // ── PDF ──
    function baixarPDF() {
        const el = document.getElementById('roteiro');
        if (el.innerHTML.includes('aparecerá aqui') || el.innerHTML.includes('Olá')) {
            return alert("Gere um sermão antes de exportar!");
        }
        html2pdf().set({
            margin: 12,
            filename: `Sermao_${MEU_NOME.replace(' ','_')}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: '#161616' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).from(el).save();
    }

    // Ctrl+Enter para gerar
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('tema').addEventListener('keydown', e => {
            if (e.ctrlKey && e.key === 'Enter') gerarSermao();
        });
    });
</script>
</body>
</html>
