<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a1a">
    <title>Gerador de Sermões Pro v2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-dark: #0d0d0d; --bg-card: #1a1a1a; --bg-input: #252525;
            --primary: #f5b041; --primary-dark: #d4941c; --accent: #e74c3c;
            --text-light: #f0f0f0; --text-muted: #888; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-light); padding: 20px; display: flex; justify-content: center; }
        .card { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 100%; max-width: 800px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--primary); text-align: center; margin-bottom: 25px; letter-spacing: 2px; }
        label { display: block; color: var(--text-muted); margin-bottom: 8px; font-size: 12px; text-transform: uppercase; }
        textarea, select { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-input); color: #fff; font-size: 16px; }
        .btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        button { padding: 15px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-gerar { background: var(--primary); color: #000; }
        .btn-hist { background: #8e44ad; color: #fff; }
        .btn-pdf { background: #27ae60; color: #fff; }
        .btn-bd { background: #3498db; color: #fff; }
        #saida { margin-top: 30px; padding: 20px; background: var(--bg-input); border-radius: 10px; line-height: 1.8; min-height: 100px; }
        #modalHistorico { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; overflow-y: auto; }
        .item-lista { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-excluir { background: var(--accent); color: white; padding: 8px; border-radius: 5px; }
        .loading { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>GERADOR DE SERMÕES</h1>
    <label>Tema ou Versículo</label>
    <textarea id="tema" placeholder="Ex: A importância da fé em tempos difíceis" rows="3"></textarea>
    
    <label>Estilo do Pregador</label>
    <select id="estiloReferencia">
        <option value="Pr. Cláudio Duarte">Pr. Cláudio Duarte</option>
        <option value="Pr. Hernandes Dias Lopes">Pr. Hernandes Dias Lopes</option>
        <option value="Pr. Isaias de Oliveira">Pr. Isaias de Oliveira</option>
    </select>

    <div class="btns">
        <button class="btn-gerar" onclick="gerarSermao()"><i class="fa-solid fa-wand-magic-sparkles"></i> GERAR</button>
        <button class="btn-bd" onclick="salvarNoBanco()"><i class="fa-solid fa-cloud-arrow-up"></i> SALVAR</button>
        <button class="btn-hist" onclick="abrirHistorico()"><i class="fa-solid fa-clock-rotate-left"></i> HISTÓRICO</button>
        <button class="btn-pdf" onclick="baixarPDF()"><i class="fa-solid fa-file-pdf"></i> PDF</button>
    </div>
    
    <div id="saida">O sermão aparecerá aqui...</div>
</div>

<div id="modalHistorico">
    <div style="max-width: 600px; margin: auto;">
        <button style="background:var(--accent); color:#fff; margin-bottom:20px;" onclick="document.getElementById('modalHistorico').style.display='none'">FECHAR</button>
        <div id="listaSermoes"></div>
    </div>
</div>

<script>
    // INSIRA SUA CHAVE DO AI STUDIO AQUI
    const KEY_GEMINI = "AIzaSyApUlp0A0t_uyZ2nth6lgB4iDtwmKXKprA"; 
    const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbwodI-fHJpXAUQknpHb4oSkfxVpxW_7715DiQey6BAPTrSUOAq9W0fFtTTR7stnEKFP/exec";

    async function gerarSermao() {
        const tema = document.getElementById('tema').value;
        const pregador = document.getElementById('estiloReferencia').value;
        if(!tema) return alert("Digite um tema!");

        document.getElementById('saida').innerHTML = '<i class="fa-solid fa-circle-notch loading"></i> Gerando sermão...';

        try {
            // ENDPOINT E MODELO COMPATÍVEIS COM GOOGLE AI STUDIO (v1beta)
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY_GEMINI}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Escreva um sermão cristão sobre ${tema} no estilo de ${pregador}. Assine como Cicero Daniel.` }] }]
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);

            const texto = data.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            document.getElementById('saida').innerHTML = `<h3>${tema}</h3><br>${texto}`;
        } catch (e) {
            alert("Erro: " + e.message);
            document.getElementById('saida').innerHTML = "Erro ao gerar.";
        }
    }

    async function salvarNoBanco() {
        const tema = document.getElementById('tema').value;
        const sermao = document.getElementById('saida').innerHTML;
        if(sermao.length < 50) return alert("Gere um sermão primeiro!");
        fetch(URL_WEB_APP, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "create", tema, pregador: "Cicero Daniel", sermao }) });
        alert("Salvo!");
    }

    async function abrirHistorico() {
        document.getElementById('modalHistorico').style.display = 'block';
        const resp = await fetch(URL_WEB_APP + "?action=read");
        const dados = await resp.json();
        let html = "";
        dados.slice().reverse().forEach(s => {
            html += `
            <div class="item-lista" id="item-${s.id}">
                <span>${s.tema}</span>
                <div style="display:flex; gap:5px;">
                    <button onclick="verSermao('${s.id}')" style="background:var(--primary); padding:5px;">VER</button>
                    <button class="btn-excluir" onclick="deletarSermao('${s.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
        });
        document.getElementById('listaSermoes').innerHTML = html || "Vazio";
        window.bancoDados = dados;
    }

    async function deletarSermao(id) {
        if(!confirm("Deletar permanentemente?")) return;
        fetch(URL_WEB_APP, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id: id }) });
        document.getElementById(`item-${id}`).remove();
    }

    function verSermao(id) {
        const s = window.bancoDados.find(x => x.id == id);
        document.getElementById('saida').innerHTML = s.sermao;
        document.getElementById('modalHistorico').style.display = 'none';
    }

    function baixarPDF() {
        const element = document.getElementById('saida');
        html2pdf().from(element).save('Sermao.pdf');
    }
</script>
</body>
</html>
